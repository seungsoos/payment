spring:
  application:
    name: payment

  datasource:
    url: jdbc:h2:mem:payment;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/ddl.sql
      data-locations: classpath:db/dml.sql
logging:
  level:
    com.musinsa.payment: DEBUG
    org.hibernate.SQL: DEBUG
